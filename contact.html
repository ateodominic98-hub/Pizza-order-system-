<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:lightblue;
  color:white;
  text-align:center;
}

nav{
  background:lightgrey;
  padding:20px;
  display:flex;
  justify-content:space-around;
}
nav {
  background: #111;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
}

.logo {
  margin: 0;
}

.menu-btn {
  font-size: 30px;
  cursor: pointer;
  display: block;
}

.nav-links {
  display: none;
  flex-direction: column;
  position: absolute;
  top: 60px;
  right: 10px;
  background: white;
  width: 200px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

.nav-links a {
  padding: 15px;
  text-decoration: none;
  color: black;
  border-bottom: 1px solid #ddd;
}

.nav-links a:hover {
  background: #f4f4f4;
}

.container{
  width:80%;
  margin:40px auto;
  padding:30px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);

  border-radius:20px;

  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{
  margin-bottom:20px;
}

p{
  font-size:18px;
  line-height:1.8;
}

button{
  background:green;
  color:white;
  border:none;
  padding:15px 25px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  margin-top:20px;
}

button:hover{
  opacity:0.9;
}

</style>
</head>

<body>
  
<nav>
  
  <h2 class="logo">🍕 Pizza Order</h2>
  
  <!-- Hamburger Button -->
  <div class="menu-btn" onclick="toggleMenu()">
    ☰
  </div>
  
  <!-- Navigation Links -->
  <div class="nav-links" id="navLinks">
    <a href="index.html">HOME</a>
    <a href="menu.html">MENU</a>
    <a href="about.html">ABOUT</a>
    <a href="contact.html">CONTACT</a>
  </div>
  
</nav>    
    <h1>📞 Contact Us</h1>
    
    <p>📍 Location: Accra, Ghana</p>
    <p>📱 Phone: +233 54 288 4499</p>
    <p>✉ Email: pizzahub@gmail.com</p>
    
    <p>
      🕒 Opening Hours:<br>
      Monday - Sunday<br>
      8:00 AM - 11:00 PM
    </p>
    
    <button onclick="chatWhatsapp()">
      Chat on WhatsApp
    </button>
    
    <hr style="margin:25px 0; opacity:0.3;">
    
    <h2>📍 Get Directions</h2>
    
    <button onclick="openMap()">
      📍 Open Google Maps
    </button>
    
  </div>
  
  <script>
function toggleMenu(){

  let contact = document.getElementById("navLinks");

  if(contact.style.display === "flex"){
    contact.style.display = "none";
  } else {
    contact.style.display = "flex";
  }

}
    function chatWhatsapp() {
      const number = "233542884499";
      
      const message = "Hello, I want to order pizza.";
      
      const url =
        "https://wa.me/" + number +
        "?text=" + encodeURIComponent(message);
      
      window.location.href = url;
    }
function openMap() {
  const url =
    "https://www.google.com/maps/search/?api=1&query=Jestbite+Foods+Kintampo";
  
  window.location.href = url;
}    
  </script>
  
</body>
</html>
