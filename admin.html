<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

nav {
  background: #111;
  color: white;
  padding: 15px;
  position: relative;
  text-align: center;
}

#counter, #revenue {
  font-size: 14px;
  margin-top: 5px;
}

.logoutBtn {
  position: absolute;
  right: 10px;
  top: 10px;
  background: red;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
}

.container {
  width: 95%;
  max-width: 900px;
  margin: 20px auto;
}

.order {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.status {
  padding: 4px 8px;
  border-radius: 5px;
  color: white;
  font-size: 12px;
}

.pending { background: orange; }
.processing { background: blue; }
.delivered { background: green; }
</style>
</head>

<body>

<nav>
  <h2>ADMIN DASHBOARD</h2>

  <div id="counter"></div>
  <div id="revenue"></div>

  <button class="logoutBtn" onclick="logout()">Logout</button>
</nav>

<div class="container" id="ordersBox"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyDh9Rye2aR7YMEW8x05Tz4P-5BMoiygmlw",
  authDomain: "pizza-order-system-80a7a.firebaseapp.com",
  projectId: "pizza-order-system-80a7a",
  storageBucket: "pizza-order-system-80a7a.appspot.com",
  messagingSenderId: "562066801142",
  appId: "1:562066801142:web:204d617e9795001b7547d7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* Notification */
const audio = new Audio("notify.mp3");
let firstLoad = true;
let previousCount = 0;

let orders = [];
let totalRevenue = 0;

const priceMap = {
  "cheese pizza": 150,
  "chicken pizza": 170,
  "pepperoni": 180,
  "veggie pizza": 160
};

/* AUTH */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  onSnapshot(collection(db, "orders"), (snapshot) => {

    orders = [];
    totalRevenue = 0;

    snapshot.forEach((d) => {
      const data = d.data();

      const price = priceMap[data.pizza] || 0;
      const qty = Number(data.quantity || 0);

      totalRevenue += price * qty;

      orders.push({ id: d.id, ...data });
    });

    /* 🔔 NOTIFICATION FIX */
    if (!firstLoad && orders.length > previousCount) {
      audio.play().catch(() => {});
    }

    previousCount = orders.length;
    firstLoad = false;

    render();
  });
});

/* RENDER */
function render() {
  document.getElementById("counter").innerText = "Orders: " + orders.length;
  document.getElementById("revenue").innerText = "Revenue: GH₵ " + totalRevenue;

  const box = document.getElementById("ordersBox");
  box.innerHTML = "";

  if (orders.length === 0) {
    box.innerHTML = "<p>No orders yet</p>";
    return;
  }

  orders.forEach(order => {
    const status = order.status || "pending";

    box.innerHTML += `
      <div class="order">
        <b>Name:</b> ${order.name}<br>
        <b>Phone:</b> ${order.phone}<br>
        <b>Pizza:</b> ${order.pizza}<br>
        <b>Quantity:</b> ${order.quantity}<br><br>

        <span class="status ${status}">${status.toUpperCase()}</span><br><br>

        <button onclick="setStatus('${order.id}','pending')">Pending</button>
        <button onclick="setStatus('${order.id}','processing')">Processing</button>
        <button onclick="setStatus('${order.id}','delivered')">Delivered</button>
        <button onclick="deleteOrder('${order.id}')">Delete</button>
      </div>
    `;
  });
}

/* ACTIONS */
window.setStatus = async (id, status) => {
  await updateDoc(doc(db, "orders", id), { status });
};

window.deleteOrder = async (id) => {
  await deleteDoc(doc(db, "orders", id));
};

window.logout = async () => {
  await signOut(auth);
  window.location.href = "login.html";
};
</script>

</body>
</html>
