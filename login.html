<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login</title>
  
  <style>
    body {
      font-family: Arial;
      background: lightblue;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    .box {
      background: white;
      padding: 30px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      text-align: center;
    }
    
    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
    }
    
    button {
      width: 100%;
      padding: 15px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  
  <div class="box">
    <h2>Admin Login</h2>
    
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    
    <button onclick="login()">Login</button>
  </div>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
const firebaseConfig = {
  apiKey: "AIzaSyDh9Rye2aR7YMEW8x05Tz4P-5BMoiygmlw",
  authDomain: "pizza-order-system-80a7a.firebaseapp.com",
  projectId: "pizza-order-system-80a7a",
  storageBucket: "pizza-order-system-80a7a.firebasestorage.app",
  messagingSenderId: "562066801142",
  appId: "1:562066801142:web:204d617e9795001b7547d7"
};    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    window.login = async function() {
      
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        
        alert("Login successful");
        window.location.href = "admin.html";
        
      } catch (error) {
        alert("Login failed: " + error.message);
      }
    };
  </script>
  
</body>

</html>
