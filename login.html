<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login</title>

  <style>
    body{
      font-family: Arial;
      background: lightblue;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box{
      background: white;
      padding: 30px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2{
      margin-bottom: 20px;
    }

    input{
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 15px;
      outline: none;
    }

    button{
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover{
      background: #333;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Admin Login</h2>

  <input type="password" id="pass" placeholder="Enter password">

  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "1234"){
    window.location.href = "admin.html";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
